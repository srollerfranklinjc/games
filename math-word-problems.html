<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake Shop Bonanza - Sloane's Learning Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive, sans-serif;
            background: linear-gradient(135deg, #f9a825 0%, #ff8f00 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #bf360c;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            background: #fff3e0;
            padding: 10px 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #e65100;
        }

        .bakery-case {
            background: linear-gradient(180deg, #fff8e1 0%, #ffe0b2 100%);
            border: 4px solid #e65100;
            border-radius: 20px;
            min-height: 100px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 2px 8px rgba(255,255,255,0.6);
        }

        .bakery-case-label {
            text-align: center;
            font-size: 0.95em;
            color: #e65100;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .treats-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            min-height: 50px;
            align-items: center;
        }

        .treat {
            font-size: 2.2em;
            animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop-in {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .game-area {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .question-type {
            display: inline-block;
            background: linear-gradient(135deg, #ff8f00, #f57c00);
            color: white;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
        }

        .visual-display {
            background: #fff3e0;
            border: 2px dashed #ffb300;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 20px;
            line-height: 2;
            word-break: break-word;
        }

        .story-card {
            background: linear-gradient(135deg, #fff8e1, #ffe082);
            border: 3px solid #ffb300;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 25px;
        }

        .story-text {
            font-size: 1.6em;
            color: #333;
            line-height: 1.5;
            text-align: center;
        }

        .answer-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #answer-input {
            width: 130px;
            font-size: 2.5em;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive, sans-serif;
            text-align: center;
            border: 4px solid #ffb300;
            border-radius: 15px;
            padding: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #333;
        }

        #answer-input:focus {
            border-color: #e91e63;
            box-shadow: 0 0 0 3px rgba(233,30,99,0.2);
        }

        #answer-input.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            animation: correct-pulse 0.6s;
        }

        #answer-input.incorrect {
            border-color: #f44336;
            background: #ffebee;
            animation: shake 0.5s;
        }

        #submit-btn {
            background: linear-gradient(135deg, #f06292 0%, #e91e63 100%);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 18px 30px;
            font-size: 1.6em;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive, sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        #submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @keyframes correct-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            text-align: center;
            font-size: 1.6em;
            font-weight: bold;
            min-height: 60px;
            padding: 15px;
            border-radius: 10px;
        }

        .feedback.correct {
            color: #2e7d32;
            background: #e8f5e9;
        }

        .feedback.incorrect {
            color: #c62828;
            background: #ffebee;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall 3s linear;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .game-complete {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
            z-index: 1001;
            transition: transform 0.3s;
            max-width: 90%;
        }

        .game-complete.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .game-complete h2 {
            color: #bf360c;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .btn-home {
            background: linear-gradient(135deg, #f06292 0%, #e91e63 100%);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2em;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive, sans-serif;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .story-text { font-size: 1.3em; }
            .visual-display { font-size: 1.2em; }
            #answer-input { font-size: 2em; width: 110px; }
            #submit-btn { font-size: 1.3em; padding: 15px 22px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🧁 Bake Shop Bonanza 🧁</h1>
            <p>Solve word problems to fill the bakery case!</p>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Problem</div>
                    <div class="stat-value"><span id="problem-num">1</span>/15</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Treats 🍩</div>
                    <div class="stat-value" id="treats-count">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Streak 🔥</div>
                    <div class="stat-value" id="streak">0</div>
                </div>
            </div>
        </div>

        <div class="bakery-case">
            <div class="bakery-case-label">🍰 Bakery Case 🍰</div>
            <div class="treats-row" id="treats-row"></div>
        </div>

        <div class="game-area">
            <div class="question-type" id="question-type">Addition</div>
            <div class="visual-display" id="visual-display"></div>
            <div class="story-card">
                <p class="story-text" id="story-text"></p>
            </div>
            <div class="answer-area">
                <input type="number" id="answer-input" min="0" max="99" placeholder="?" />
                <button id="submit-btn" onclick="submitAnswer()">Check ✓</button>
            </div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
        const questions = [
            {
                question: "Addition",
                story: "Mia put 4 cookies on a tray. Then she added 3 more cookies. How many cookies are on the tray now?",
                visual: "🍪🍪🍪🍪  +  🍪🍪🍪",
                correct: 7,
                explanation: "4 cookies + 3 more = 7 cookies! 🎉"
            },
            {
                question: "Subtraction",
                story: "There were 9 cupcakes on the shelf. Sam ate 2 of them. How many cupcakes are left?",
                visual: "🧁🧁🧁🧁🧁🧁🧁🧁🧁",
                correct: 7,
                explanation: "9 cupcakes − 2 eaten = 7 cupcakes left! 🎉"
            },
            {
                question: "Addition",
                story: "The baker made 6 muffins in the morning and 5 muffins in the afternoon. How many muffins did she make in all?",
                visual: "🧇🧇🧇🧇🧇🧇  +  🧇🧇🧇🧇🧇",
                correct: 11,
                explanation: "6 muffins + 5 muffins = 11 muffins! 🎉"
            },
            {
                question: "Subtraction",
                story: "There were 12 donuts in the box. The class ate 5 of them. How many donuts are left?",
                visual: "🍩🍩🍩🍩🍩🍩🍩🍩🍩🍩🍩🍩",
                correct: 7,
                explanation: "12 donuts − 5 eaten = 7 donuts left! 🎉"
            },
            {
                question: "How many more?",
                story: "Leo has 8 strawberries. Zoe has 5 strawberries. How many more strawberries does Leo have than Zoe?",
                visual: "Leo: 🍓🍓🍓🍓🍓🍓🍓🍓   Zoe: 🍓🍓🍓🍓🍓",
                correct: 3,
                explanation: "8 − 5 = 3. Leo has 3 more strawberries! 🎉"
            },
            {
                question: "Addition",
                story: "There are 7 slices of cake on the big plate and 6 slices on the little plate. How many slices are there altogether?",
                visual: "🎂🎂🎂🎂🎂🎂🎂  +  🎂🎂🎂🎂🎂🎂",
                correct: 13,
                explanation: "7 slices + 6 slices = 13 slices! 🎉"
            },
            {
                question: "Subtraction",
                story: "There were 15 pretzels in the basket. Some kids took 8 pretzels. How many pretzels are left?",
                visual: "🥨🥨🥨🥨🥨🥨🥨🥨🥨🥨🥨🥨🥨🥨🥨",
                correct: 7,
                explanation: "15 pretzels − 8 taken = 7 pretzels left! 🎉"
            },
            {
                question: "How many fewer?",
                story: "The red tray has 10 rolls. The blue tray has 6 rolls. How many fewer rolls does the blue tray have?",
                visual: "Red: 🥖🥖🥖🥖🥖🥖🥖🥖🥖🥖   Blue: 🥖🥖🥖🥖🥖🥖",
                correct: 4,
                explanation: "10 − 6 = 4. The blue tray has 4 fewer rolls! 🎉"
            },
            {
                question: "Addition",
                story: "Ben put 8 chocolate chips on one cookie and 9 chocolate chips on another cookie. How many chocolate chips did he use in all?",
                visual: "🍫🍫🍫🍫🍫🍫🍫🍫  +  🍫🍫🍫🍫🍫🍫🍫🍫🍫",
                correct: 17,
                explanation: "8 chips + 9 chips = 17 chips! 🎉"
            },
            {
                question: "Subtraction",
                story: "There were 11 pie slices at the bake sale. By lunchtime, 4 slices were sold. How many slices are still there?",
                visual: "🥧🥧🥧🥧🥧🥧🥧🥧🥧🥧🥧",
                correct: 7,
                explanation: "11 slices − 4 sold = 7 slices left! 🎉"
            },
            {
                question: "Addition",
                story: "Grandma baked 3 apple pies and 4 cherry pies. How many pies did Grandma bake in all?",
                visual: "🥧🥧🥧  +  🥧🥧🥧🥧",
                correct: 7,
                explanation: "3 pies + 4 pies = 7 pies! 🎉"
            },
            {
                question: "How many in all?",
                story: "One jar has 9 candies. Another jar has 8 candies. How many candies are in both jars?",
                visual: "🍬🍬🍬🍬🍬🍬🍬🍬🍬  +  🍬🍬🍬🍬🍬🍬🍬🍬",
                correct: 17,
                explanation: "9 candies + 8 candies = 17 candies! 🎉"
            },
            {
                question: "Subtraction",
                story: "The baker had 14 sprinkle donuts. She gave 6 to the neighbors. How many donuts does she have now?",
                visual: "🍩🍩🍩🍩🍩🍩🍩🍩🍩🍩🍩🍩🍩🍩",
                correct: 8,
                explanation: "14 donuts − 6 given away = 8 donuts! 🎉"
            },
            {
                question: "How many more?",
                story: "The cookie jar has 13 cookies. The tin has 9 cookies. How many more cookies are in the jar than the tin?",
                visual: "Jar: 🍪🍪🍪🍪🍪🍪🍪🍪🍪🍪🍪🍪🍪   Tin: 🍪🍪🍪🍪🍪🍪🍪🍪🍪",
                correct: 4,
                explanation: "13 − 9 = 4. The jar has 4 more cookies! 🎉"
            },
            {
                question: "Addition",
                story: "At the bake sale, 9 brownies were sold in the morning and 8 brownies were sold in the afternoon. How many brownies were sold in all?",
                visual: "🟫🟫🟫🟫🟫🟫🟫🟫🟫  +  🟫🟫🟫🟫🟫🟫🟫🟫",
                correct: 17,
                explanation: "9 brownies + 8 brownies = 17 brownies! 🎉"
            }
        ];

        const treatEmojis = ['🍪', '🧁', '🍩', '🥧', '🎂', '🥐', '🍰', '🥮'];

        let shuffled = [];
        let currentQuestion = 0;
        let streak = 0;
        let totalScore = 0;
        const maxQuestions = 15;

        function initGame() {
            shuffled = [...questions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestion >= maxQuestions) {
                showGameComplete();
                return;
            }

            const q = shuffled[currentQuestion];

            document.getElementById('question-type').textContent = q.question;
            document.getElementById('visual-display').textContent = q.visual;
            document.getElementById('story-text').textContent = q.story;

            const feedback = document.getElementById('feedback');
            feedback.textContent = '';
            feedback.className = 'feedback';

            const input = document.getElementById('answer-input');
            input.value = '';
            input.className = '';
            input.disabled = false;
            input.focus();

            const btn = document.getElementById('submit-btn');
            btn.disabled = false;

            input.onkeydown = function(e) {
                if (e.key === 'Enter') submitAnswer();
            };
        }

        function submitAnswer() {
            const input = document.getElementById('answer-input');
            const btn = document.getElementById('submit-btn');
            const feedback = document.getElementById('feedback');
            const entered = parseInt(input.value);

            if (isNaN(entered) || input.value.trim() === '') {
                input.classList.add('incorrect');
                setTimeout(() => input.classList.remove('incorrect'), 500);
                input.focus();
                return;
            }

            input.disabled = true;
            btn.disabled = true;

            const q = shuffled[currentQuestion];

            if (entered === q.correct) {
                input.classList.add('correct');
                feedback.textContent = q.explanation;
                feedback.className = 'feedback correct';

                totalScore++;
                streak++;
                updateStats();
                addTreatToCase();
                celebrate();

                setTimeout(() => {
                    input.value = '';
                    input.className = '';
                    currentQuestion++;
                    updateStats();
                    loadQuestion();
                }, 2000);
            } else {
                input.classList.add('incorrect');
                feedback.textContent = `Not quite! Try again. 🤔`;
                feedback.className = 'feedback incorrect';

                streak = 0;
                updateStats();

                setTimeout(() => {
                    input.classList.remove('incorrect');
                    input.disabled = false;
                    btn.disabled = false;
                    input.select();
                    input.focus();
                }, 800);
            }
        }

        function addTreatToCase() {
            const row = document.getElementById('treats-row');
            const treat = document.createElement('span');
            treat.className = 'treat';
            treat.textContent = treatEmojis[Math.floor(Math.random() * treatEmojis.length)];
            row.appendChild(treat);
        }

        function updateStats() {
            document.getElementById('problem-num').textContent = currentQuestion + 1 > maxQuestions ? maxQuestions : currentQuestion + 1;
            document.getElementById('treats-count').textContent = totalScore;
            document.getElementById('streak').textContent = streak;
        }

        function celebrate() {
            const celebration = document.getElementById('celebration');
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = ['#f39c12', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#ff69b4'][Math.floor(Math.random() * 6)];
                confetti.style.animationDelay = Math.random() * 0.3 + 's';
                celebration.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function showGameComplete() {
            const accuracy = Math.round((totalScore / maxQuestions) * 100);
            let message, stars;

            if (accuracy >= 87) {
                message = 'Master Baker!';
                stars = '⭐⭐⭐⭐⭐';
            } else if (accuracy >= 73) {
                message = 'Sous Chef!';
                stars = '⭐⭐⭐⭐';
            } else if (accuracy >= 60) {
                message = 'Apprentice Baker!';
                stars = '⭐⭐⭐';
            } else {
                message = 'Keep Baking!';
                stars = '⭐⭐';
            }

            const completeDiv = document.createElement('div');
            completeDiv.className = 'game-complete';
            completeDiv.innerHTML = `
                <h2>🎊 Bake Shop Complete! 🎊</h2>
                <div style="font-size: 4em; margin: 20px 0;">🧁🍪🍩🥧🎂</div>
                <div style="font-size: 3em; margin-bottom: 20px;">${stars}</div>
                <p style="font-size: 1.8em; margin-bottom: 15px;">${message}</p>
                <p style="font-size: 1.3em; color: #666; margin-bottom: 10px;">You filled the case with ${totalScore} treats!</p>
                <p style="font-size: 1.2em; color: #666; margin-bottom: 25px;">Accuracy: ${accuracy}%</p>
                <button class="btn-home" onclick="location.reload()">Bake Again!</button>
                <a href="index.html" class="btn-home">Back to Games</a>
            `;
            document.body.appendChild(completeDiv);

            setTimeout(() => completeDiv.classList.add('show'), 100);
            celebrate();
        }

        initGame();
    </script>
</body>
</html>
